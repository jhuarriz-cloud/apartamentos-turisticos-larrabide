<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LodgingBusiness",
  "@id": "{{ .Site.BaseURL }}#lodging",
  "name": "Apartamentos Turísticos Larrabide",
  "url": "{{ .Site.BaseURL }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "C/ Larrabide, 3 bis",
    "addressLocality": "Pamplona",
    "addressRegion": "Navarra",
    "addressCountry": "ES"
  },
  "amenityFeature": [
    {
      "@type": "LocationFeatureSpecification",
      "name": "Wi-Fi",
      "value": true
    },
    {
      "@type": "LocationFeatureSpecification",
      "name": "Lavadora",
      "value": true
    },
    {
      "@type": "LocationFeatureSpecification",
      "name": "Cocina",
      "value": true
    },
    {
      "@type": "LocationFeatureSpecification",
      "name": "Guarda bicicletas",
      "value": true
    }
  ]
}
</script> 
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Inicio",
      "item": "{{ .Site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ if eq .Section "apartamentos" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Apartment",
  "@id": "{{ .Permalink }}#apartment",
  "name": "{{ .Title }}",
  "description": "{{ .Description }}",
  "url": "{{ .Permalink }}",
  "image": "{{ .Params.hero | absURL }}",
  "numberOfBedrooms": {{ .Params.dormitorios }},
  "occupancy": {
    "@type": "QuantitativeValue",
    "maxValue": {{ .Params.capacidad }}
  },
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "C/ Larrabide, 3 bis",
    "addressLocality": "Pamplona",
    "addressRegion": "Navarra",
    "addressCountry": "ES"
  },
  "containedInPlace": {
    "@type": "LodgingBusiness",
    "@id": "{{ .Site.BaseURL }}#lodging",
    "name": "Apartamentos Turísticos Larrabide"
  },
  "sameAs": [
    "{{ .Params.booking }}",
    "{{ .Params.airbnb }}"
  ]
}
</script>
{{ end }}
