<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
{{ if .IsHome }}
Apartamentos Turísticos Larrabide | Pamplona
{{ else }}
{{ .Title }} | Apartamentos Turísticos Larrabide
{{ end }}
</title>

{{ with .Description }}
<meta name="description" content="{{ . }}">
{{ else }}
<meta name="description" content="Apartamentos Turísticos Larrabide en Pamplona. Alojamiento para turismo, congresos, viajes profesionales y estancias de varios días.">
{{ end }}

<link rel="canonical" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }} | Apartamentos Turísticos Larrabide">
<meta property="og:description" content="{{ .Description }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Apartamentos Turísticos Larrabide">
<meta property="og:locale" content="es_ES">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ .Title }} | Apartamentos Turísticos Larrabide">
<meta name="twitter:description" content="{{ .Description }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/apartments.css">
<link rel="stylesheet" href="/css/cicloturismo.css">
<link rel="stylesheet" href="/css/eventos.css">
{{ partial "structured-data.html" . }}
