name: Actualizar eventos de Pamplona

on:
  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-eventos:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Actualizar eventos
        run: |
          python scripts/actualizar_eventos.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No hay cambios en los eventos."
          else
            git add content/pamplona/eventos/
            git commit -m "Actualiza eventos de Pamplona"
            git push
          fi
